<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="#6b6058" stroke="none">

  <!-- 铁塔：左腿 -->
  <polygon points="46,40 52,40 40,118 32,118" />

  <!-- 铁塔：右腿 -->
  <polygon points="68,40 74,40 88,118 80,118" />

  <!-- 横梁 -->
  <rect x="43" y="72" width="34" height="4" />

  <!-- 塔尖 -->
  <rect x="57" y="6" width="6" height="34" />

  <!-- 天线横臂 -->
  <rect x="52" y="16" width="16" height="3" />
  <rect x="54" y="10" width="12" height="2.5" />

  <!-- 表盘底座：实心圆 -->
  <circle cx="60" cy="58" r="20" />

  <!-- 表盘内挖空：纯黑圆（模拟黑色背景） -->
  <circle cx="60" cy="58" r="17" fill="#070504" />

  <!-- 表圈断裂缺口：用黑色弧形盖住 7-8 点方向 -->
  <path d="M48 70 A17 17 0 0 0 53 73 L50 77 A20 20 0 0 1 44 73 Z" fill="#070504" />

  <!-- 刻度块：12 点 -->
  <rect x="58.5" y="43" width="3" height="5" />
  <!-- 3 点 -->
  <rect x="72" y="56.5" width="5" height="3" />
  <!-- 6 点 -->
  <rect x="58.5" y="70" width="3" height="5" />
  <!-- 9 点 -->
  <rect x="43" y="56.5" width="5" height="3" />

  <!-- 次刻度：1 点 -->
  <rect x="65" y="44.5" width="2" height="3.5" transform="rotate(30 66 46)" />
  <!-- 2 点 -->
  <rect x="70" y="49" width="2" height="3.5" transform="rotate(60 71 51)" />
  <!-- 4 点 -->
  <rect x="71" y="64" width="2" height="3.5" transform="rotate(120 72 66)" />
  <!-- 5 点 -->
  <rect x="67" y="70" width="2" height="3.5" transform="rotate(150 68 71.5)" />
  <!-- 10 点 -->
  <rect x="48" y="45" width="2" height="3.5" transform="rotate(-30 49 47)" />
  <!-- 11 点 -->
  <rect x="52" y="44" width="2" height="3.5" transform="rotate(-60 53 45.5)" />

  <!-- 时针：宽实体，停在 11 点 -->
  <polygon points="59,58 61,58 58,44 56,45" />

  <!-- 分针：窄实体，停在 4 点 -->
  <polygon points="59.5,57 60.5,57 68,69 66.5,70" />

  <!-- 表芯铆钉 -->
  <circle cx="60" cy="58" r="2.5" />

  <!-- 裂痕：从 1 点方向斜劈表盘 -->
  <polygon points="68,46 69,47 61,57 63,67 62,68 60,58" fill="#070504" opacity="0.85" />

  <!-- 裂痕分支 -->
  <polygon points="61,53 62,53.5 59,48 58,48.5" fill="#070504" opacity="0.6" />

</svg>
