<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4a462",
                        "background-light": "#f8f7f6",
                        "background-dark": "#0f172a", /* Deep charcoal/navy base */
                        "industrial-steel": "#334155",
                        "amber-glow": "#fbbf24"
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Newsreader', serif;
        }
        .vignette-overlay {
            background: radial-gradient(circle, transparent 20%, rgba(15, 23, 42, 0.9) 100%);
        }
        .amber-shadow {
            box-shadow: 0 0 20px rgba(244, 164, 98, 0.4);
        }
        .amber-shadow:hover {
            box-shadow: 0 0 30px rgba(244, 164, 98, 0.6);
        }
        .steam-filter {
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden">
<!-- Full-screen Background Container -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-cover bg-center grayscale-[0.5] contrast-[1.2]" data-alt="Frozen steampunk city covered in thick snow and ice" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBSQtA82Kjcz8PRk5t69IU84R9Ckn-cu8oAhtO-SmEZ5FCIeW3m1NFfZGuhVd6_lbeY9tUJLJ_TkbvMXTVXZFJ3dSMvykokD51GrWSCY8_7wELgPCMSB7Rl-T-D0NKrb1odWewCn4wDRrl8MUZBJ-H9f0rUXayAWyN9AsP3x9BA-A2cOfDZPxOyo1AqDmi0fyLIl-B0kUksc1dfCvUNnuqAbDvh816yoR8dFZs7Mb6wKdH7hElKAgQhXCizSx6FLZmGfYaukX4TesA')">
</div>
<div class="absolute inset-0 vignette-overlay"></div><div class="absolute inset-0 bg-blue-500/15 mix-blend-color pointer-events-none"></div>
<!-- Moving snow/particle effect simulation with gradients -->
<div class="absolute inset-0 pointer-events-none opacity-80">
<!-- Left Building Window Glows -->
<div class="absolute top-[48%] left-[12%] w-2 h-2 bg-orange-400 rounded-full blur-[3px] shadow-[0_0_8px_rgba(251,191,36,0.8)]"></div>
<div class="absolute top-[52%] left-[15%] w-1.5 h-1.5 bg-orange-300 rounded-full blur-[2px] shadow-[0_0_6px_rgba(251,191,36,0.6)]"></div>
<div class="absolute top-[44%] left-[18%] w-2 h-2 bg-orange-400 rounded-full blur-[3px] shadow-[0_0_10px_rgba(251,191,36,0.7)]"></div>
<div class="absolute top-[60%] left-[14%] w-1.5 h-1.5 bg-orange-500 rounded-full blur-[2px] shadow-[0_0_8px_rgba(251,191,36,0.8)]"></div>
<div class="absolute top-[65%] left-[11%] w-2 h-2 bg-orange-400 rounded-full blur-[4px] shadow-[0_0_12px_rgba(251,191,36,0.6)]"></div>
<!-- Right Building Window Glows -->
<div class="absolute top-[45%] right-[25%] w-2 h-2 bg-orange-400 rounded-full blur-[3px] shadow-[0_0_8px_rgba(251,191,36,0.8)]"></div>
<div class="absolute top-[55%] right-[23%] w-2 h-2 bg-orange-300 rounded-full blur-[3px] shadow-[0_0_10px_rgba(251,191,36,0.7)]"></div>
<div class="absolute top-[62%] right-[21%] w-1.5 h-1.5 bg-orange-400 rounded-full blur-[2px] shadow-[0_0_6px_rgba(251,191,36,0.8)]"></div>
<div class="absolute top-[35%] right-[27%] w-1.5 h-1.5 bg-orange-500 rounded-full blur-[2px] shadow-[0_0_8px_rgba(251,191,36,0.9)]"></div>
<div class="absolute top-[50%] right-[28%] w-2 h-2 bg-orange-400 rounded-full blur-[4px] shadow-[0_0_12px_rgba(251,191,36,0.7)]"></div>
<div class="absolute top-[28%] right-[24%] w-1.5 h-1.5 bg-orange-300 rounded-full blur-[2px] shadow-[0_0_10px_rgba(251,191,36,0.6)]"></div>
</div></div>
<!-- UI Layer -->
<div class="relative z-10 flex flex-col min-h-screen">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between px-6 py-4 lg:px-12 border-b border-primary/10 bg-background-dark/40 steam-filter">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl">ac_unit</span>
<h2 class="text-xl font-bold tracking-[0.2em] uppercase text-slate-100">Frostpunk Tales</h2>
</div>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-industrial-steel/30 hover:bg-primary/20 transition-colors border border-primary/20 text-slate-100">
<span class="material-symbols-outlined text-[20px]">settings</span>
</button>
</header>
<!-- Main Landing Content -->
<main class="flex-1 flex flex-col items-center justify-center px-4">
<div class="max-w-md w-full flex flex-col items-center space-y-12">
<!-- Atmospheric Branding -->
<div class="text-center space-y-4">
<div class="inline-block px-4 py-1 border-y border-primary/30 mb-2">
<span class="text-primary text-xs tracking-[0.4em] uppercase font-semibold">New London District VII</span>
</div>
<h1 class="text-5xl lg:text-7xl font-bold tracking-tight text-slate-100 leading-none italic">
                        The Great <br/>
<span class="text-primary">Freezing</span>
</h1>
<p class="text-slate-400 text-lg font-light tracking-wide max-w-xs mx-auto">
                        Temperature dropping. Coal levels critical. Identify yourself, Citizen.
                    </p>
</div>
<!-- Central Input Container -->
<div class="w-full space-y-8 bg-background-dark/60 p-10 rounded-xl border border-industrial-steel/50 steam-filter relative">
<!-- Industrial Corner Accents -->
<div class="absolute -top-1 -left-1 w-4 h-4 border-t-2 border-l-2 border-primary/60"></div>
<div class="absolute -top-1 -right-1 w-4 h-4 border-t-2 border-r-2 border-primary/60"></div>
<div class="absolute -bottom-1 -left-1 w-4 h-4 border-b-2 border-l-2 border-primary/60"></div>
<div class="absolute -bottom-1 -right-1 w-4 h-4 border-b-2 border-r-2 border-primary/60"></div>
<div class="flex flex-col gap-6">
<div class="relative group">
<label class="absolute -top-3 left-4 bg-background-dark px-2 text-xs font-bold uppercase tracking-widest text-primary/80">
                                Citizen Designation
                            </label>
<input class="w-full bg-background-dark/80 border-b-2 border-t-0 border-x-0 border-industrial-steel focus:border-primary focus:ring-0 text-slate-100 text-xl py-4 px-4 transition-all placeholder:text-slate-600 font-display" placeholder="Enter your name..." type="text"/>
</div>
<button class="w-full bg-primary hover:bg-amber-glow text-background-dark font-bold text-lg py-4 rounded-lg transition-all amber-shadow uppercase tracking-widest flex items-center justify-center gap-3">
<span>Initialize Survival</span>
<span class="material-symbols-outlined font-bold">bolt</span>
</button>
</div>
</div>
<!-- Footer Stats -->
<div class="flex gap-12 text-slate-500 text-xs uppercase tracking-[0.2em] font-bold">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">thermostat</span>
<span>-42°C</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">group</span>
<span>1,204 Alive</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">history</span>
<span>Day 114</span>
</div>
</div>
</div>
</main>
<!-- Ambient Bottom Vignette -->
<footer class="p-6 text-center text-[10px] text-slate-600 uppercase tracking-[0.5em] font-bold">
            Property of the Last City © 1887-2024
        </footer>
</div>
</body></html>
